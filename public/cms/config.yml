backend:
  name: git-gateway
  branch: main

local_backend: false

media_folder: "public/images"
public_folder: "/images"

collections:

  # ── Hero Slideshow ─────────────────────────────────
  - name: "hero"
    label: "Hero Slideshow"
    label_singular: "Hero Slide"
    folder: "content/hero"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    description: "Upload student/sparring/event photos for the homepage hero slider."
    fields:
      - { label: "Headline", name: "title", widget: "string" }
      - { label: "Sub-text", name: "subtitle", widget: "text" }
      - { label: "Photo", name: "image", widget: "image", hint: "Upload training or event photo (1920x1080 ideal)" }
      - { label: "Button Text", name: "button_text", widget: "string", default: "Join Training" }
      - { label: "Button Link", name: "button_link", widget: "string", default: "https://wa.me/918522833600" }

  # ── Events ─────────────────────────────────────────
  - name: "events"
    label: "Events"
    label_singular: "Event"
    folder: "content/events"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    description: "Add events with multiple photos. Photos auto-play as mini slideshow on event card."
    fields:
      - { label: "Event Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Description", name: "description", widget: "text" }
      - label: "Event Photos (multiple — will slideshow)"
        name: "photos"
        widget: "list"
        hint: "Upload multiple photos. They will auto-play as a slideshow on the event card."
        field: { label: "Photo", name: "photo", widget: "image" }
      - { label: "Single Cover Photo (optional)", name: "image", widget: "image", required: false }

  # ── Gallery ────────────────────────────────────────
  - name: "gallery"
    label: "Gallery"
    label_singular: "Gallery Photo"
    folder: "content/gallery"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    description: "Upload photos for the gallery page. Tick the checkbox to also show a photo in the hero slider."
    fields:
      - { label: "Photo", name: "image", widget: "image" }
      - { label: "Caption", name: "caption", widget: "string", required: false }
      - label: "Also show in Hero Slideshow"
        name: "show_in_hero"
        widget: "boolean"
        default: false
        hint: "Tick to also show this photo in the homepage hero slider"

  # ── News and Announcements ─────────────────────────
  - name: "announcements"
    label: "News and Announcements"
    label_singular: "Announcement"
    folder: "content/announcements"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    description: "Add news items. Pinned items show in the red bar at top. All items scroll in the blue ticker."
    fields:
      - { label: "Announcement Text", name: "title", widget: "string", hint: "The text shown in the news bar" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - label: "Badge"
        name: "badge"
        widget: "select"
        options:
          - { label: "NEW (red)", value: "NEW" }
          - { label: "URGENT (orange)", value: "URGENT" }
          - { label: "UPDATE (blue)", value: "UPDATE" }
          - { label: "INFO (grey)", value: "INFO" }
        default: "NEW"
      - label: "Pin to top (shows in red bar, always visible)"
        name: "pinned"
        widget: "boolean"
        default: false
      - label: "Active (show on site)"
        name: "active"
        widget: "boolean"
        default: true
        hint: "Uncheck to hide without deleting"
      - label: "Link Type"
        name: "link_type"
        widget: "select"
        options:
          - { label: "No link", value: "none" }
          - { label: "Website URL", value: "url" }
          - { label: "PDF File", value: "pdf" }
        default: "none"
      - { label: "URL (if URL type)", name: "link", widget: "string", required: false, hint: "e.g. WhatsApp link or website URL" }
      - label: "PDF File (if PDF type)"
        name: "pdf"
        widget: "file"
        required: false
        hint: "Upload timetables, results, schedules as PDF"
        media_folder: "public/pdfs"
        public_folder: "/pdfs"
